<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Salami</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Hind+Siliguri&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

<h1>Digital Salami</h1>

<p class="subtitle">
নাম লিখুন, জেলা নির্বাচন করুন, স্পিন করুন এবং আপনার ডিজিটাল সালামি গ্রহণ করুন
</p>

<div class="card">

<input id="nameInput" placeholder="আপনার নাম">

<select id="districtInput">
<option value="">জেলা নির্বাচন করুন</option>
<option>Dhaka</option>
<option>Chattogram</option>
<option>Sylhet</option>
<option>Rajshahi</option>
<option>Khulna</option>
<option>Barishal</option>
<option>Rangpur</option>
</select>

<button id="saveBtn">Continue</button>

</div>


<div class="slot-area">

<div class="slots">

<div id="slot1">0</div>
<div id="slot2">0</div>
<div id="slot3">1</div>

</div>

<button id="spinBtn" disabled>
Spin
</button>

</div>


<div id="card" class="card hidden">

<h2 id="amount">৳0</h2>

<p id="wish"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
